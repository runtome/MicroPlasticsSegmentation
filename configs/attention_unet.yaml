defaults:
  - base

model:
  name: attention_unet
  encoder: efficientnet-b3
  pretrained: true
  in_channels: 3
  num_classes: 2
  features: [64, 128, 256, 512]
  dropout: 0.3

training:
  optimizer: adamw
  lr: 3.0e-4
  weight_decay: 1.0e-2
  batch_size: 4
  num_epochs: 100
  use_5fold_cv: true
  num_folds: 5
  loss: combined

callbacks:
  early_stopping:
    patience: 15
    monitor: val_loss
  scheduler:
    name: cosine
    T_max: 100
    min_lr: 1.0e-6
  checkpoint:
    monitor: val_miou
    save_top_k: 1

output:
  checkpoint_dir: outputs/checkpoints/attention_unet/
  log_dir: outputs/logs/attention_unet/
